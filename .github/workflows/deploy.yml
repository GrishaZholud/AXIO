# Builds the Astro site and publishes the static output to the `deploy`
# branch. Timeweb App Platform watches `deploy` (framework: HTML/CSS/JS)
# and serves the prebuilt files as pure static — real 404s, no SPA fallback.
name: Build & publish to deploy branch

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Publish dist → deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy
          # Keep .htaccess and other dotfiles in the published output.
          enable_jekyll: false
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
